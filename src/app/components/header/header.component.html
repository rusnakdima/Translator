<header class="mb-8 flex items-center justify-between">
  <div class="text-left">
    <h1
      class="mb-2 text-3xl font-bold md:text-4xl dark:text-slate-100 text-slate-800"
    >
      {{ title() }}
    </h1>
    <p class="text-sm dark:text-slate-400 text-slate-600">
      {{ subtitle() }}
    </p>
  </div>
  <div class="flex items-center gap-2">
    <button
      (click)="showShortcuts.emit()"
      class="rounded-xl px-4 py-2 text-sm font-medium transition-all cursor-pointer dark:bg-slate-700 dark:text-slate-200 dark:hover:bg-slate-600 bg-slate-200 text-slate-700 hover:bg-slate-300"
      title="Keyboard shortcuts"
    >
      <svg
        class="h-5 w-5"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"
        />
      </svg>
    </button>
    <app-theme-toggle [isDark]="isDark()" (toggleChange)="toggleTheme.emit()" />
  </div>
</header>
