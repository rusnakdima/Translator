<div class="relative">
  <textarea
    [ngModel]="translatedText()"
    readonly
    appAutoResize
    class="min-h-[50px] w-full resize-none overflow-hidden rounded-xl border p-4 pr-10 focus:outline-none dark:border-neutral-600 dark:bg-neutral-700/50 dark:text-neutral-100 dark:placeholder-neutral-400 border-slate-300 bg-slate-100 text-slate-800 placeholder-slate-500"
    [id]="outputId()"
    [placeholder]="placeholder()"
  ></textarea>
</div>
<div class="mt-2 flex items-center justify-end">
  <button
    (click)="copyClick.emit()"
    class="flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-sm transition-all dark:border-neutral-600 dark:bg-neutral-700 dark:text-neutral-300 dark:hover:bg-neutral-600 border-slate-300 bg-white text-slate-600 hover:bg-slate-200"
    title="Copy to clipboard"
  >
    <app-icon name="copy" />
    Copy
  </button>
</div>
