<div class="relative">
  <textarea
    [ngModel]="text()"
    (ngModelChange)="text.set($event); onTextChange()"
    (keydown)="keyDown.emit($event)"
    appAutoResize
    class="min-h-[50px] w-full resize-none overflow-hidden rounded-xl border p-4 pr-10 focus:outline-none dark:border-slate-600 dark:bg-slate-700/50 dark:text-slate-100 dark:placeholder-slate-400 dark:focus:border-indigo-500 border-slate-300 bg-slate-100 text-slate-800 placeholder-slate-500 focus:border-indigo-500"
    [id]="inputId()"
    [placeholder]="placeholder()"
  ></textarea>
</div>
<div class="mt-2 flex items-center justify-between">
  <span class="text-xs dark:text-slate-400 text-slate-500">{{
    charCount()
  }}</span>
  <button
    (click)="onClear()"
    class="flex items-center gap-1.5 rounded-lg border px-3 py-1.5 text-sm transition-all dark:border-slate-600 dark:bg-slate-700 dark:text-slate-300 dark:hover:bg-slate-600 border-slate-300 bg-white text-slate-600 hover:bg-slate-200"
    title="Clear text"
  >
    <app-icon name="clear" />
    Clear
  </button>
</div>
