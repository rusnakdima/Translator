@if (shortcuts()) {
  <div
    class="overlay-backdrop fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm"
    (click)="onBackdropClick($event)"
  >
    <div
      class="w-full max-w-md max-h-[90vh] rounded-2xl p-6 shadow-2xl overflow-hidden dark:bg-neutral-800 dark:border-neutral-700 bg-white border-slate-300"
    >
      <div class="mb-4 flex items-center justify-between">
        <h2 class="text-xl font-bold dark:text-slate-100 text-slate-800">
          Keyboard Shortcuts
        </h2>
        <button
          (click)="onClose()"
          class="rounded-lg p-2 transition-colors dark:hover:bg-neutral-700 hover:bg-slate-200"
        >
          <app-icon
            name="clear"
            [svgClass]="'h-5 w-5 dark:text-slate-400 text-slate-500'"
          />
        </button>
      </div>

      <div class="space-y-2 overflow-y-auto max-h-[60vh]">
        @for (shortcut of shortcutsList; track shortcut.action) {
          <div
            class="flex items-center justify-between rounded-lg px-4 py-3 dark:bg-neutral-700/50 bg-slate-100"
          >
            <span class="text-sm dark:text-slate-300 text-slate-600">
              {{ shortcut.description }}
            </span>
            <kbd
              class="rounded px-2 py-1 text-sm font-mono dark:bg-neutral-900 dark:text-neutral-300 bg-white text-slate-700 border dark:border-neutral-600 border-slate-300"
            >
              {{ shortcut.key }}
            </kbd>
          </div>
        }
      </div>

      <p class="mt-4 text-center text-xs dark:text-slate-500 text-slate-400">
        Press <kbd class="font-mono">Ctrl + /</kbd> to toggle this overlay
      </p>
    </div>
  </div>
}
